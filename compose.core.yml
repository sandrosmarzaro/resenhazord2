# Core node (VM-B): the bot, on its own. It connects to the broker on the edge node via
# RABBITMQ_URL (amqps://<edge_private_ip> in production). No depends_on the gateway —
# broker durability replaces boot ordering, so the bot deploys and restarts on its own.
services:
  bot:
    container_name: bot
    image: ghcr.io/sandrosmarzaro/resenhazord2:python
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    # Apply pending migrations before serving, then hand PID 1 to uvicorn.
    command: sh -c "alembic upgrade head && exec uvicorn bot.main:app --host 0.0.0.0 --port 8000"
    # yt-dlp cookies for login-gated sources (Instagram). Place the Netscape-format
    # file at ./secrets/cookies.txt and set YTDLP_COOKIES=/secrets/cookies.txt in .env.
    # rw lets yt-dlp persist rotated session cookies, extending login validity.
    volumes:
      - ./secrets:/secrets
    networks:
      - resenha-network
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  resenha-network:
    driver: bridge
