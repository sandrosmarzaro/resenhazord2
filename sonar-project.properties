sonar.projectKey=resenhazord2
sonar.organization=smarzaro

# Python core only; gateway TS stays on eslint + tsc + Codecov (its coverage is
# generated in a separate CI job and is not available to this scan).
sonar.sources=bot
sonar.tests=tests
sonar.python.version=3.14

# Coverage report generated by `pytest --cov-report=xml` in the test-py job.
sonar.python.coverage.reportPaths=coverage.xml

# Rule exclusions — confirmed false positives, already validated by zuban + basedpyright.
sonar.issue.ignore.multicriteria=e1,e2
# S7503: async test fakes implement an async port interface without awaiting.
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**/*.py
# S5886: dataclasses.replace stub returns DataclassInstance; real return type is CommandData.
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S5886
sonar.issue.ignore.multicriteria.e2.resourceKey=bot/**/*.py
