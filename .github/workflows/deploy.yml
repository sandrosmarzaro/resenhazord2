name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-ts:
    name: TS lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun typecheck
      - run: bun lint
      - run: bun format:check

  ci-py:
    name: Python lint and type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run basedpyright

  test-ts:
    name: TS tests
    runs-on: ubuntu-latest
    needs: ci-ts
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: typescript

  test-py:
    name: Python tests
    runs-on: ubuntu-latest
    needs: ci-py
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run pytest -v

  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [test-ts, test-py]
    if: github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push TS bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/sandrosmarzaro/resenhazord2:latest
          cache-from: type=gha,scope=ts
          cache-to: type=gha,mode=max,scope=ts

      - name: Build and push Python core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.py
          push: true
          tags: ghcr.io/sandrosmarzaro/resenhazord2-python:latest
          cache-from: type=gha,scope=py
          cache-to: type=gha,mode=max,scope=py

  deploy:
    name: SSH deploy to Oracle VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_APP_DIR }} && git pull && docker compose pull && docker compose up -d"
