name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy to Oracle VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_APP_DIR }} && git pull && docker compose pull && docker compose up -d --no-build"

      - name: Create deployment
        run: |
          gh api repos/${{ github.repository }}/deployments \
            -f environment=production \
            -f description="Deployed to Oracle VPS" \
            -f auto_merge=false

      - name: Set deployment status pending
        run: |
          DEPLOYMENT_ID=$(gh api repos/${{ github.repository }}/deployments \
            --jq '.[0].id' -f environment=production)
          gh api repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
            -f description="Deploying updates..." \
            -f state=pending

      - name: Set deployment status success
        if: success()
        run: |
          DEPLOYMENT_ID=$(gh api repos/${{ github.repository }}/deployments \
            --jq '.[0].id' -f environment=production)
          gh api repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
            -f description="Deployed to Oracle VPS" \
            -f state=success

      - name: Set deployment status failure
        if: failure()
        run: |
          DEPLOYMENT_ID=$(gh api repos/${{ github.repository }}/deployments \
            --jq '.[0].id' -f environment=production)
          gh api repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
            -f description="Deployment failed" \
            -f state=failure