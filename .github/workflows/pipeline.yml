name: Pipeline

on:
  push:
    branches:
      - main

jobs:
  # Stage 1: Lint, format, type check (parallel)
  lint-ts:
    name: TS lint and format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile
      - run: bun typecheck
      - run: bun lint
      - run: bun format:check

  lint-py:
    name: Python lint and type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run zuban check

  security-py:
    name: Python security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run bandit -c bandit.toml -r bot/

  complexity-py:
    name: Python complexity gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run task complexity

  # Stage 2: Tests (after lint passes)
  test-ts:
    name: TS tests
    runs-on: ubuntu-latest
    needs: lint-ts
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile
      - run: bun test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: typescript
          files: gateway/coverage/lcov.info

  test-py:
    name: Python tests
    runs-on: ubuntu-latest
    needs: [lint-py, security-py, complexity-py]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run pytest -v --cov=bot --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          files: coverage.xml

  # Stage 3: Build Docker images (after all tests pass)
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [test-ts, test-py]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push TS bot
        uses: docker/build-push-action@v7
        with:
          context: ./gateway
          file: gateway/Dockerfile
          push: true
          tags: ghcr.io/sandrosmarzaro/resenhazord2:latest
          cache-from: type=gha,scope=ts
          cache-to: type=gha,mode=max,scope=ts

      - name: Build and push Python core
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/sandrosmarzaro/resenhazord2:python
          cache-from: type=gha,scope=py
          cache-to: type=gha,mode=max,scope=py

  # Stage 4: Deploy — two explicit jobs, one per node (ADR 0006). They run in parallel;
  # queue-contract changes follow expand/contract discipline so deploy order never matters.
  deploy-edge:
    name: SSH deploy to edge node (gateway + broker)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    env:
      VPS_HOST: ${{ secrets.VPS_EDGE_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.VPS_EDGE_SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 \
            "$VPS_USER@$VPS_HOST" \
            "cd $VPS_APP_DIR && git pull && docker compose -f compose.edge.yml pull && docker compose -f compose.edge.yml up -d --no-build"

  deploy-core:
    name: SSH deploy to core node (bot)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    env:
      VPS_HOST: ${{ secrets.VPS_CORE_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.VPS_CORE_SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 \
            "$VPS_USER@$VPS_HOST" \
            "cd $VPS_APP_DIR && git pull && docker compose -f compose.core.yml pull && docker compose -f compose.core.yml up -d --no-build"

  # Stage 5: Register deployment (after deploy)
  register-deploy:
    name: Register GitHub deployment
    runs-on: ubuntu-latest
    needs: [deploy-edge, deploy-core]
    permissions:
      deployments: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'main',
              environment: 'production',
              description: 'Deploy to Oracle VPS',
              auto_merge: false,
              required_contexts: []
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'production',
              description: 'Deployment completed successfully'
            });

  # Stage 6: Tag release (after deploy)
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    needs: [deploy-edge, deploy-core]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create and push tag
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "v${VERSION}"; then
            echo "Tag v${VERSION} already exists, skipping"
          else
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists, skipping"
          else
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes --latest
          fi

  # Stage 7: Back-merge main into develop
  back-merge:
    name: Back-merge main into develop
    runs-on: ubuntu-latest
    needs: tag
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: develop
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "develop already contains main, nothing to back-merge"
            exit 0
          fi
          git merge --no-ff origin/main -m "chore: back-merge main into develop"
          git push origin develop
