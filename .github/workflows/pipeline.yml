name: Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  # Gate: skip the entire pipeline for semantic-release commits
  # to avoid re-deploying on version-bump pushes that only touch CHANGELOG/pyproject.toml
  gate:
    name: Check pipeline eligibility
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Skip semantic-release commits
        id: check
        run: |
          if [ "${{ github.event.head_commit.committer.name }}" = "semantic-release" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # Stage 1: Lint, format, type check (parallel)
  lint-ts:
    name: TS lint and format check
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile
      - run: bun typecheck
      - run: bun lint
      - run: bun format:check

  lint-py:
    name: Python lint and type check
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run basedpyright

  # Stage 2: Tests (after lint passes)
  test-ts:
    name: TS tests
    runs-on: ubuntu-latest
    needs: lint-ts
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile
      - run: bun test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: typescript
          files: gateway/coverage/lcov.info

  test-py:
    name: Python tests
    runs-on: ubuntu-latest
    needs: [lint-py, complexity-py]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - run: uv sync --frozen
      - run: uv run pytest -v --cov=bot --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          files: coverage.xml

  complexity-py:
    name: Python complexity gate
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - run: uv sync --frozen
      - run: uv run task complexity

  # Stage 3: Build Docker images (after all tests pass)
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [test-ts, test-py]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push TS bot
        uses: docker/build-push-action@v7
        with:
          context: ./gateway
          file: gateway/Dockerfile
          push: true
          tags: ghcr.io/sandrosmarzaro/resenhazord2:latest
          cache-from: type=gha,scope=ts
          cache-to: type=gha,mode=max,scope=ts

      - name: Build and push Python core
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/sandrosmarzaro/resenhazord2:python
          cache-from: type=gha,scope=py
          cache-to: type=gha,mode=max,scope=py

  # Stage 4: Deploy (after build)
  deploy:
    name: SSH deploy to Oracle VPS
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 \
            "$VPS_USER@$VPS_HOST" \
            "cd $VPS_APP_DIR && git pull && docker compose pull && docker compose up -d --no-build"

  # Stage 5: Register deployment (after deploy)
  register-deploy:
    name: Register GitHub deployment
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      deployments: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'main',
              environment: 'production',
              description: 'Deploy to Oracle VPS',
              auto_merge: false,
              required_contexts: []
            })

  # Stage 6: Release (after deploy)
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    outputs:
      released: ${{ steps.check_release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Run Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GIT_COMMITTER_NAME: semantic-release
          GIT_COMMITTER_EMAIL: semantic-release@users.noreply.github.com
        run: |
          uvx python-semantic-release@10 -c semantic-release.toml version
          uvx python-semantic-release@10 -c semantic-release.toml publish

      - name: Check if release was created
        id: check_release
        run: |
          if [ -n "${{ steps.release.outputs.version }}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  # Stage 7: Back-merge main into develop (always, not only on new releases)
  backmerge:
    name: Back-merge main into develop
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff origin/main -m "chore: back-merge main into develop"
          git push origin develop