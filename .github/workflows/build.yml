name: Build

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push TS bot
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          file: gateway/Dockerfile
          push: true
          tags: ghcr.io/sandrosmarzaro/resenhazord2:latest
          cache-from: type=gha,scope=ts
          cache-to: type=gha,mode=max,scope=ts

      - name: Build and push Python core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/sandrosmarzaro/resenhazord2:python
          cache-from: type=gha,scope=py
          cache-to: type=gha,mode=max,scope=py