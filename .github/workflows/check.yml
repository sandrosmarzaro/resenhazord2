name: Check

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-ts:
    name: TS lint and format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile
      - run: bun typecheck
      - run: bun lint
      - run: bun format:check

  lint-py:
    name: Python lint and type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run zuban check

  security-py:
    name: Python security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run bandit -c bandit.toml -r bot/

  test-ts:
    name: TS tests
    runs-on: ubuntu-latest
    needs: lint-ts
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile
      - run: bun test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: typescript
          files: gateway/coverage/lcov.info
      - name: Share TS coverage with the Sonar job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-ts
          path: gateway/coverage/lcov.info

  test-py:
    name: Python tests
    runs-on: ubuntu-latest
    needs: [lint-py, security-py, complexity-py]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run pytest -v --cov=bot --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          files: coverage.xml
      - name: Share Python coverage with the Sonar job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-python
          path: coverage.xml

  sonar:
    name: SonarQube Cloud scan
    runs-on: ubuntu-latest
    needs: [test-py, test-ts]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # SonarQube needs full history for new-code/SCM blame
      - name: Fetch Python coverage
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-python
      - name: Fetch TS coverage
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-ts
          path: gateway/coverage
      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  complexity-py:
    name: Python complexity gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run task complexity

  mutation-py:
    name: Python mutation testing
    runs-on: ubuntu-latest
    needs: test-py
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - name: Scope mutation to changed files
        run: |
          # Keep paths_to_mutate = bot/ so the sandbox holds the full package
          # (conftest imports bot.application etc.). Narrowing it copies only the
          # changed files' import closure, which is incomplete and crashes the
          # baseline run. Instead, only RUN mutants for the changed mutable files.
          # bot/data holds pure lookup tables (no logic) and yields no mutants, which
          # makes mutmut abort when a data file is the only changed mutable file.
          # Keep this list in sync with do_not_mutate in setup.cfg.
          EXCLUDE='^bot/(infrastructure|adapters|ports|data)/|^bot/(main|settings)\.py$|^bot/domain/services/discord\.py$'
          CHANGED=$(git diff --name-only origin/develop...HEAD -- 'bot/**.py' | { grep -vE "$EXCLUDE" || true; })
          if [ -z "$CHANGED" ]; then
            echo "No mutable Python files changed in bot/, skipping mutation testing"
            echo "SKIP_MUTMUT=true" >> "$GITHUB_ENV"
          else
            FILTERS=$(echo "$CHANGED" | sed 's|/|.|g; s|\.py$|*|' | tr '\n' ' ')
            echo "MUTMUT_FILTERS=$FILTERS" >> "$GITHUB_ENV"
            echo "Mutating: $FILTERS"
          fi
      - name: Run mutation on changed modules
        if: env.SKIP_MUTMUT != 'true'
        run: |
          set -f  # keep the * in $MUTMUT_FILTERS literal, no shell globbing
          uv run mutmut run $MUTMUT_FILTERS
      - run: uv run mutmut results
        if: env.SKIP_MUTMUT != 'true'