name: Check

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-ts:
    name: TS lint and format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile
      - run: bun typecheck
      - run: bun lint
      - run: bun format:check

  lint-py:
    name: Python lint and type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run zuban check

  security-py:
    name: Python security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - run: uv sync --frozen
      - run: uv run bandit -c bandit.toml -r bot/

  test-ts:
    name: TS tests
    runs-on: ubuntu-latest
    needs: lint-ts
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile
      - run: bun test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: typescript
          files: gateway/coverage/lcov.info

  test-py:
    name: Python tests
    runs-on: ubuntu-latest
    needs: [lint-py, security-py, complexity-py]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - run: uv sync --frozen
      - run: uv run pytest -v --cov=bot --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          files: coverage.xml

  complexity-py:
    name: Python complexity gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - run: uv sync --frozen
      - run: uv run task complexity

  mutation-py:
    name: Python mutation testing
    runs-on: ubuntu-latest
    needs: test-py
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - run: uv sync --frozen
      - name: Scope mutation to changed files
        run: |
          # Drop paths listed as do_not_mutate in setup.cfg: mutmut skips them, so
          # scoping to only those yields an empty sandbox that fails the baseline run.
          EXCLUDE='^bot/(infrastructure|adapters)/|^bot/(main|settings)\.py$|^bot/domain/services/discord\.py$'
          CHANGED=$(git diff --name-only origin/develop...HEAD -- 'bot/**.py' | { grep -vE "$EXCLUDE" || true; } | tr '\n' ',')
          if [ -z "$CHANGED" ]; then
            echo "No mutable Python files changed in bot/, skipping mutation testing"
            echo "SKIP_MUTMUT=true" >> "$GITHUB_ENV"
          else
            sed -i "s|^paths_to_mutate = .*|paths_to_mutate = ${CHANGED%,}|" setup.cfg
            echo "Mutating: $CHANGED"
          fi
      - run: uv run mutmut run
        if: env.SKIP_MUTMUT != 'true'
      - run: uv run mutmut results
        if: env.SKIP_MUTMUT != 'true'