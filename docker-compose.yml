services:
  whatsapp:
    container_name: whatsapp
    image: ghcr.io/sandrosmarzaro/resenhazord2:latest
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file: .env
    tty: true
    working_dir: /app
    depends_on:
      bot:
        condition: service_healthy
    networks:
      - bot-network
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pidof bun || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bot:
    container_name: bot
    image: ghcr.io/sandrosmarzaro/resenhazord2:python
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    networks:
      - bot-network
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  bot-network:
    driver: bridge
