# Local all-in-one dev stack (gateway + bot + broker on one host). Production runs the
# two-node split instead: compose.edge.yml (gateway + rabbitmq) and compose.core.yml (bot).
services:
  whatsapp:
    container_name: whatsapp
    image: ghcr.io/sandrosmarzaro/resenhazord2:latest
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # Reach the broker by its service name; .env's localhost only works on the host.
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    tty: true
    working_dir: /app
    depends_on:
      bot:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bot-network
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pidof bun || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bot:
    container_name: bot
    image: ghcr.io/sandrosmarzaro/resenhazord2:python
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - bot-network
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.13-management
    env_file: .env
    networks:
      - bot-network
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    mem_limit: 400m
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    container_name: postgres
    image: postgres:17-alpine
    env_file: .env
    networks:
      - bot-network
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    mem_limit: 256m
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  rabbitmq-data:
  postgres-data:

networks:
  bot-network:
    driver: bridge
