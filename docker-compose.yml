services:
  whatsapp:
    container_name: whatsapp
    image: ghcr.io/sandrosmarzaro/resenhazord2:latest
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file: .env
    tty: true
    working_dir: /app
    depends_on:
      bot:
        condition: service_healthy
    networks:
      - bot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pidof bun || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bot:
    container_name: bot
    image: ghcr.io/sandrosmarzaro/resenhazord2-python:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./cookies.txt:/app/cookies.txt
    networks:
      - bot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  bot-network:
    driver: bridge
