# Edge node (VM-A): gateway + broker. The gateway holds the stable Baileys session and
# RabbitMQ lives beside it so the broker survives bot redeploys on the core node.
# In production the core node's bot reaches RabbitMQ over the VCN private subnet
# (RABBITMQ_URL=amqps://<edge_private_ip>); locally, run both compose files together
# (docker compose -f compose.edge.yml -f compose.core.yml up) and they share the network.
services:
  whatsapp:
    container_name: whatsapp
    image: ghcr.io/sandrosmarzaro/resenhazord2:latest
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file: .env
    tty: true
    working_dir: /app
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - resenha-network
    restart: unless-stopped
    # Cap the gateway so a Baileys reconnect-storm or leak OOM-kills this container
    # (restart: unless-stopped then recovers) instead of starving the ~1 GB host into the
    # SSH-dead freeze. Pairs with the connection watchdog (mute-stall) and the host swap.
    mem_limit: 384m
    dns:
      - 1.1.1.1
      - 8.8.8.8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pidof bun || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.13-management
    env_file: .env
    networks:
      - resenha-network
    restart: unless-stopped
    # AMQP exposed for the core node over the VCN private subnet (Oracle security list
    # opens 5672 only from VM-B). Management UI stays bound to localhost.
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672"
    mem_limit: 400m
    # No RABBITMQ_VM_MEMORY_HIGH_WATERMARK env: rabbitmq:3.13 rejects that deprecated
    # variable and refuses to start. The default 0.4 relative watermark is also the
    # safer choice on this 1 GB node (blocks publishers before the host OOMs).
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  rabbitmq-data:

networks:
  resenha-network:
    driver: bridge
