[mutmut]
paths_to_mutate = bot/
tests_dir = tests/
also_copy =
    pytest.toml
    bot/
pytest_add_cli_args =
    -p
    no:xdist
    --no-cov
    --override-ini=addopts=
    --import-mode=importlib
    --ignore=tests/integration/test_country_flag_api.py
do_not_mutate =
    bot/infrastructure/*
    bot/adapters/*
    bot/ports/*
    bot/main.py
    bot/settings.py
    bot/domain/services/discord.py
