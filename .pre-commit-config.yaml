fail_fast: true
default_stages: [pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(bot|tests)/
      - id: ruff-format
        files: ^(bot|tests)/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: end-of-file-fixer
        files: \.py$
      - id: trailing-whitespace
        files: \.py$

  - repo: local
    hooks:
      - id: gateway-lint
        name: gateway eslint
        entry: bash -c 'cd gateway && bun lint'
        language: system
        files: ^gateway/
        pass_filenames: false
      - id: gateway-typecheck
        name: gateway typecheck
        entry: bash -c 'cd gateway && bun typecheck'
        language: system
        files: ^gateway/
        pass_filenames: false
      - id: gateway-format
        name: gateway format check
        entry: bash -c 'cd gateway && bun format:check'
        language: system
        files: ^gateway/
        pass_filenames: false
